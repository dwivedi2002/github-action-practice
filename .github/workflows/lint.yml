# What is the goal of your Workflow
# Goal : Whenever someone changes the py code, 
# the linter will check if the syntax, format, indentation, basically linting is correct or not 
name: Auto Linter

on:
  push: 
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    # this step will automatically clone the code of the current branch into the runner
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7 
        
    # this step will install the linting tool 
      - name: Install Linter
        run: pip install ruff
